<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What2Watch</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="color:red;padding:2rem;font-family:monospace">' +
          '<h2>JS Error</h2><pre>' + msg + '\n' + url + ':' + line + ':' + col +
          '\n' + (err && err.stack ? err.stack : '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="color:red;padding:2rem;font-family:monospace">' +
          '<h2>Unhandled Promise Rejection</h2><pre>' + e.reason + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
