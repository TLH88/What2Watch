services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./certs:/certs:ro
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-what2watch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-what2watch}
      POSTGRES_DB: ${POSTGRES_DB:-what2watch}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U what2watch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
